name: Build Android APK

on:
  push:
    tags:
      - 'android-v*'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build APK'
        required: false
        default: 'false'
      debug_build:
        description: 'Allow debug keystore for testing'
        required: false
        default: 'false'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install Android SDK components
      run: |
        sdkmanager "build-tools;33.0.2" "platforms;android-33"
        
    - name: Install Bubblewrap CLI
      run: npm install -g @bubblewrap/cli
      
    - name: Get version information
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/android-v}
        else
          VERSION=$(node -p "require('./package.json').version")-dev
        fi
        
        # Convert semantic version to version code (for Android)
        VERSION_CODE=$(echo $VERSION | sed 's/[^0-9.]//g' | awk -F. '{printf "%d%03d%03d", $1, $2, $3}')
        
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
        
        echo "Building version: $VERSION (code: $VERSION_CODE)"
        
    - name: Create release keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        DEBUG_BUILD: ${{ github.event.inputs.debug_build || 'false' }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 -d > release-key.jks
          echo "Using provided release keystore"
          echo "USING_RELEASE_KEYSTORE=true" >> $GITHUB_ENV
        elif [ "$DEBUG_BUILD" = "true" ]; then
          # Generate debug keystore ONLY for explicit debug builds
          keytool -genkey -v -keystore debug-key.jks -keyalg RSA -keysize 2048 -validity 10000 \
            -alias debugkey -keypass android -storepass android \
            -dname "CN=WytNet Debug, OU=Development, O=WytNet, L=Unknown, S=Unknown, C=US"
          mv debug-key.jks release-key.jks
          echo "Generated debug keystore (for testing only)"
          echo "USING_RELEASE_KEYSTORE=false" >> $GITHUB_ENV
        else
          echo "❌ No release keystore provided and DEBUG_BUILD not set to true"
          echo "❌ Cannot build production APK without proper signing certificate"
          echo "Please add ANDROID_KEYSTORE secret or set DEBUG_BUILD=true for testing"
          exit 1
        fi
        
    - name: Initialize TWA project
      run: |
        # Create temporary directory for TWA build
        mkdir -p twa-build
        cd twa-build
        
        # Initialize Bubblewrap project with our config
        bubblewrap init --manifest https://wytnet.com/manifest.json
        
        # Update twa-manifest.json with version info
        jq --arg version "${{ steps.version.outputs.VERSION }}" \
           --argjson version_code ${{ steps.version.outputs.VERSION_CODE }} \
           '.appVersionName = $version | .appVersionCode = $version_code' \
           twa-manifest.json > tmp.json && mv tmp.json twa-manifest.json
           
        # Copy our keystore
        cp ../release-key.jks ./
        
    - name: Build APK
      working-directory: twa-build
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android' }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'debugkey' }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android' }}
      run: |
        # Build the APK
        bubblewrap build --skipPwaValidation
        
        # Sign the APK if we have signing info
        if [ -f "release-key.jks" ]; then
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore release-key.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            app-release-unsigned.apk "$KEY_ALIAS"
            
          # Align the APK
          zipalign -v 4 app-release-unsigned.apk app-release-signed.apk
          
          echo "APK signed successfully"
        else
          cp app-release-unsigned.apk app-release-signed.apk
          echo "APK built (unsigned)"
        fi
        
    - name: Generate APK metadata
      working-directory: twa-build
      run: |
        APK_PATH="app-release-signed.apk"
        if [ ! -f "$APK_PATH" ]; then
          APK_PATH="app-release-unsigned.apk"
        fi
        
        SIZE=$(stat -c%s "$APK_PATH")
        SHA256=$(sha256sum "$APK_PATH" | cut -d' ' -f1)
        BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        
        # Create metadata JSON
        jq -n \
          --arg version "${{ steps.version.outputs.VERSION }}" \
          --argjson version_code ${{ steps.version.outputs.VERSION_CODE }} \
          --argjson size $SIZE \
          --arg sha256 "$SHA256" \
          --arg build_time "$BUILD_TIME" \
          --arg download_url "/downloads/wytnet-latest.apk" \
          '{
            version: $version,
            versionCode: $version_code,
            size: $size,
            sha256: $sha256,
            buildTime: $build_time,
            downloadUrl: $download_url
          }' > metadata.json
          
        echo "Generated metadata for APK: $SIZE bytes, SHA256: $SHA256"
        
    - name: Upload to Object Storage (if configured)
      env:
        REPLIT_DEPLOY_URL: ${{ secrets.REPLIT_DEPLOY_URL }}
      working-directory: twa-build
      run: |
        APK_PATH="app-release-signed.apk"
        if [ ! -f "$APK_PATH" ]; then
          APK_PATH="app-release-unsigned.apk"
        fi
        
        if [ -n "$REPLIT_DEPLOY_URL" ]; then
          echo "📦 Uploading APK and metadata to Replit Object Storage..."
          
          # Get signed upload URLs from Replit backend
          APK_UPLOAD_URL=$(curl -s -X POST "${REPLIT_DEPLOY_URL}/api/ci/upload-urls" \
            -H "Content-Type: application/json" \
            -d '{"type":"apk"}' | jq -r '.apkUploadUrl')
            
          METADATA_UPLOAD_URL=$(curl -s -X POST "${REPLIT_DEPLOY_URL}/api/ci/upload-urls" \
            -H "Content-Type: application/json" \
            -d '{"type":"metadata"}' | jq -r '.metadataUploadUrl')
          
          if [ "$APK_UPLOAD_URL" != "null" ] && [ "$METADATA_UPLOAD_URL" != "null" ]; then
            # Upload APK
            echo "📱 Uploading APK..."
            curl -X PUT "$APK_UPLOAD_URL" \
              -H "Content-Type: application/vnd.android.package-archive" \
              --data-binary @"$APK_PATH"
            
            # Upload metadata
            echo "📄 Uploading metadata..."
            curl -X PUT "$METADATA_UPLOAD_URL" \
              -H "Content-Type: application/json" \
              --data-binary @metadata.json
            
            echo "✅ Successfully uploaded APK and metadata to Object Storage"
          else
            echo "❌ Failed to get upload URLs from Replit backend"
            echo "Response: APK=$APK_UPLOAD_URL, Metadata=$METADATA_UPLOAD_URL"
          fi
        else
          echo "⚠️ REPLIT_DEPLOY_URL not configured - APK will only be available as GitHub artifact"
          echo "To enable automatic deployment, add REPLIT_DEPLOY_URL secret (e.g., https://your-app.replit.app)"
        fi
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wytnet-apk-${{ steps.version.outputs.VERSION }}
        path: |
          twa-build/app-release-*.apk
          twa-build/metadata.json
        retention-days: 90
        
    - name: Create release (on tag with release keystore only)
      if: startsWith(github.ref, 'refs/tags/') && env.USING_RELEASE_KEYSTORE == 'true'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          twa-build/app-release-*.apk
          twa-build/metadata.json
        body: |
          ## WytNet Android APK Release v${{ steps.version.outputs.VERSION }}
          
          **Version Code:** ${{ steps.version.outputs.VERSION_CODE }}
          **Build Date:** $(date -u +"%Y-%m-%d %H:%M UTC")
          
          ### Download Options:
          - 🔗 **Direct Download:** [wytnet-latest.apk](https://wytnet.com/downloads/wytnet-latest.apk)
          - 📱 **Install PWA:** Visit [wytnet.com/mobile-app](https://wytnet.com/mobile-app)
          
          ### Features:
          - Full WytNet authentication system
          - Offline functionality with cached data  
          - Native Android app experience
          - Multi-tenant SaaS platform access
          
          **SHA-256:** See metadata.json for file checksums
        generate_release_notes: true
        
    - name: Display build summary
      working-directory: twa-build
      run: |
        echo "=== Build Summary ==="
        echo "Version: ${{ steps.version.outputs.VERSION }}"
        echo "Version Code: ${{ steps.version.outputs.VERSION_CODE }}"
        
        if [ -f "app-release-signed.apk" ]; then
          echo "APK: app-release-signed.apk ($(stat -c%s app-release-signed.apk) bytes)"
          echo "SHA256: $(sha256sum app-release-signed.apk | cut -d' ' -f1)"
        else
          echo "APK: app-release-unsigned.apk ($(stat -c%s app-release-unsigned.apk) bytes)"
          echo "SHA256: $(sha256sum app-release-unsigned.apk | cut -d' ' -f1)"
        fi
        
        echo "Metadata: $(cat metadata.json)"
        echo "====================="